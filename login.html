<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sistema Almacén - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: {
        primary: { DEFAULT: '#0D3B85', light: '#1A56B4', dark: '#0a2d66' }
      }}}
    }
  </script>
  <style>
    html { zoom: 1; width: 100%; }
    * { -webkit-tap-highlight-color: transparent; }
    body { width: 100vw; max-width: 100vw; overflow-x: hidden; }
    @media (max-width: 640px) {
      button { min-height: 40px; }
      input, select, textarea { font-size: 16px !important; }
    }
  </style>
</head>
<body class="min-h-screen bg-[#F0F2F5] dark:bg-gray-950 flex items-center justify-center px-4">

  <!-- Toggle Dark/Light -->
  <button id="toggleTheme"
    class="fixed top-4 right-4 p-2 rounded-full bg-white dark:bg-gray-800 shadow-md hover:shadow-lg transition-all"
    onclick="toggleTheme()">
    <svg id="iconSun" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-yellow-500 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m8.66-9h-1M4.34 12h-1m15.07-6.07-.71.71M6.34 17.66l-.71.71m12.73 0-.71-.71M6.34 6.34l-.71-.71M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/>
    </svg>
    <svg id="iconMoon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-[#0D3B85]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <!-- Card Login -->
  <div class="w-full max-w-sm bg-[#FAFAFA] dark:bg-gray-900 rounded-2xl shadow-xl p-8">

    <!-- Logo / Título -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-14 h-14 rounded-2xl flex items-center justify-center mb-3" style="background-color:#0D3B85">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0v10l-8 4m-8-4V7m8 4v10"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-[#212529] dark:text-white">Sistema Almacén</h1>
      <p class="text-sm text-gray-400 dark:text-gray-500 mt-1">Ingresa tus credenciales</p>
    </div>

    <!-- Mensaje sesión expirada -->
    <div id="msgSesion" class="hidden mb-4 text-sm text-amber-700 bg-amber-50 dark:bg-amber-950 dark:text-amber-300 border border-amber-200 dark:border-amber-800 rounded-lg px-3 py-2">
      <span id="msgSesionText"></span>
    </div>

    <!-- Formulario -->
    <div class="space-y-4">

      <!-- Usuario -->
      <div>
        <label class="block text-sm font-medium text-[#212529] dark:text-gray-300 mb-1">Usuario</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-3 flex items-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0zM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
            </svg>
          </span>
          <input id="inputUsuario" type="text" placeholder="Tu usuario"
            class="w-full pl-9 pr-4 py-2.5 rounded-lg border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-[#212529] dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-[#1A56B4] transition"
            onkeydown="if(event.key==='Enter') document.getElementById('inputContrasena').focus()"/>
        </div>
      </div>

      <!-- Contraseña -->
      <div>
        <label class="block text-sm font-medium text-[#212529] dark:text-gray-300 mb-1">Contraseña</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-3 flex items-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25z"/>
            </svg>
          </span>
          <input id="inputContrasena" type="password" placeholder="Tu contraseña"
            class="w-full pl-9 pr-10 py-2.5 rounded-lg border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-[#212529] dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-[#1A56B4] transition"
            onkeydown="if(event.key==='Enter') iniciarLogin()"/>
          <button type="button" onclick="togglePass()" class="absolute inset-y-0 right-3 flex items-center text-gray-400 hover:text-gray-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Error -->
      <div id="errorMsg" class="hidden text-sm text-red-500 bg-red-50 dark:bg-red-950 border border-red-200 dark:border-red-800 rounded-lg px-3 py-2 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
        </svg>
        <span id="errorText"></span>
      </div>

      <!-- Botón -->
      <button id="btnLogin" onclick="iniciarLogin()"
        class="w-full py-2.5 rounded-lg text-white font-semibold text-sm transition-all hover:opacity-90 active:scale-95 flex items-center justify-center gap-2"
        style="background-color:#0D3B85">
        <span id="btnTexto">Ingresar</span>
        <svg id="btnSpinner" class="hidden animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
        </svg>
      </button>

    </div>
  </div>

  <script>
    // ── SUPABASE CONFIG ────────────────────────────────────────
    const SUPABASE_URL  = 'https://mwivnsbybzsivicrrbpd.supabase.co';
    const SUPABASE_ANON = 'sb_publishable_O0H19Ni20_MsQ7kYsRtlHA_AJ250EKE';

    async function sha256(texto) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(texto));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    async function loginSupabase(usuario, contrasena) {
      const hash = await sha256(contrasena);
      const res  = await fetch(
        `${SUPABASE_URL}/rest/v1/usuarios?usuario=eq.${encodeURIComponent(usuario)}&password_hash=eq.${encodeURIComponent(hash)}&activo=eq.true&select=dni,usuario,nombres,rol,email`,
        { headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}` } }
      );
      if (!res.ok) throw new Error('Error de conexión');
      const rows = await res.json();
      if (!rows.length) throw new Error('Usuario o contraseña incorrectos');
      return rows[0];
    }

    // ── TEMA ──────────────────────────────────────────────────
    function applyTheme(dark) {
      document.documentElement.classList.toggle('dark', dark);
      document.getElementById('iconSun').classList.toggle('hidden', !dark);
      document.getElementById('iconMoon').classList.toggle('hidden', dark);
    }
    function toggleTheme() {
      const isDark = document.documentElement.classList.contains('dark');
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
      applyTheme(!isDark);
    }
    applyTheme(localStorage.getItem('theme') === 'dark');

    // Mensaje de sesión expirada
    const logoutMsg = sessionStorage.getItem('logoutMsg');
    if (logoutMsg) {
      document.getElementById('msgSesionText').textContent = logoutMsg;
      document.getElementById('msgSesion').classList.remove('hidden');
      sessionStorage.removeItem('logoutMsg');
    }

    // ── PASS TOGGLE ───────────────────────────────────────────
    function togglePass() {
      const input = document.getElementById('inputContrasena');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    // ── LOGIN ─────────────────────────────────────────────────
    async function iniciarLogin() {
      const usuario   = document.getElementById('inputUsuario').value.trim();
      const contrasena = document.getElementById('inputContrasena').value;
      if (!usuario || !contrasena) { mostrarError('Completa todos los campos'); return; }

      setLoading(true);
      ocultarError();

      try {
        const user = await loginSupabase(usuario, contrasena);
        localStorage.setItem('usuario', JSON.stringify(user));
        localStorage.setItem('lastActivity', Date.now());

        const rutas = { Encargado: 'encargado.html', Operario: 'operario.html', Admin: 'admin.html', Gerencia: 'gerencia.html' };
        window.location.href = rutas[user.rol] || 'index.html';
      } catch (err) {
        setLoading(false);
        mostrarError(err.message || 'Error de conexión. Intenta nuevamente.');
      }
    }

    function mostrarError(msg) {
      document.getElementById('errorText').textContent = msg;
      document.getElementById('errorMsg').classList.remove('hidden');
    }
    function ocultarError() {
      document.getElementById('errorMsg').classList.add('hidden');
    }
    function setLoading(loading) {
      document.getElementById('btnLogin').disabled = loading;
      document.getElementById('btnTexto').textContent = loading ? 'Verificando...' : 'Ingresar';
      document.getElementById('btnSpinner').classList.toggle('hidden', !loading);
    }
  </script>
</body>
</html>
