<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Operario - Sistema Almacén</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: {
        primary: { DEFAULT: '#0D3B85', light: '#1A56B4', dark: '#0a2d66' }
      }}}
    }
  </script>
  <style>
    html { zoom: 1; width: 100%; }
    * { -webkit-tap-highlight-color: transparent; }
    body { width: 100vw; max-width: 100vw; overflow-x: hidden; }
    @media (max-width: 640px) {
      button { min-height: 40px; }
      input, select, textarea { font-size: 16px !important; }
    }
  </style>
</head>
<body class="min-h-screen bg-[#F0F2F5] dark:bg-gray-950 text-[#212529] dark:text-white transition-colors duration-300">

  <!-- OVERLAY CARGA INICIAL -->
  <div id="loadingOverlay" class="fixed inset-0 z-[100] bg-white dark:bg-gray-950 flex flex-col items-center justify-center gap-4">
    <div class="w-12 h-12 rounded-2xl flex items-center justify-center" style="background-color:#0D3B85">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0v10l-8 4m-8-4V7m8 4v10"/>
      </svg>
    </div>
    <svg class="animate-spin h-6 w-6 text-[#0D3B85]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
    </svg>
    <p class="text-sm text-gray-400">Cargando tus órdenes...</p>
  </div>

  <!-- NAVBAR -->
  <nav class="sticky top-0 z-40 bg-white dark:bg-gray-900 shadow-sm px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background-color:#0D3B85">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0v10l-8 4m-8-4V7m8 4v10"/>
        </svg>
      </div>
      <div>
        <p class="text-sm font-semibold leading-none">Sistema Almacén</p>
        <p class="text-xs text-gray-400 mt-0.5">Operario: <span id="navNombre"></span></p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <button onclick="toggleTheme()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition">
        <svg id="iconSun" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-yellow-500 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m8.66-9h-1M4.34 12h-1m15.07-6.07-.71.71M6.34 17.66l-.71.71m12.73 0-.71-.71M6.34 6.34l-.71-.71M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/>
        </svg>
        <svg id="iconMoon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-[#0D3B85]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button onclick="cerrarSesion()" class="flex items-center gap-1.5 text-sm px-3 py-1.5 rounded-lg text-red-500 hover:bg-red-50 dark:hover:bg-red-950 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9"/>
        </svg>
        Salir
      </button>
    </div>
  </nav>

  <!-- CONTENIDO -->
  <main class="max-w-2xl mx-auto px-4 py-6">
    <div class="flex items-center justify-between mb-5">
      <div>
        <h2 class="text-lg font-bold">Mis Órdenes</h2>
        <p class="text-sm text-gray-400">Órdenes asignadas a ti</p>
      </div>
      <!-- Indicador offline -->
      <div id="offlineBadge" class="hidden items-center gap-1.5 text-xs text-amber-600 bg-amber-50 dark:bg-amber-950 border border-amber-200 dark:border-amber-800 px-2.5 py-1.5 rounded-lg font-medium">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18M10.584 10.587a2 2 0 002.828 2.828M12 20.49c-5.5 0-9.5-4-9.5-8.49C2.5 7.5 7.5 3.5 12 3.5"/>
        </svg>
        Sin conexión
      </div>
      <button onclick="cargarOrdenes()" class="flex items-center gap-1.5 px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-700 text-sm hover:bg-gray-50 dark:hover:bg-gray-800 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99"/>
        </svg>
        Recargar
      </button>
    </div>

    <!-- FILTRO -->
    <div class="flex gap-2 mb-4 overflow-x-auto pb-1">
      <button onclick="setFiltro('')" id="filtroTodos"
        class="shrink-0 px-3 py-1.5 rounded-full text-xs font-medium transition border border-[#0D3B85] text-[#0D3B85] dark:text-white dark:border-white">Todas</button>
      <button onclick="setFiltro('Asignada')" id="filtroAsignada"
        class="shrink-0 px-3 py-1.5 rounded-full text-xs font-medium transition border border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-400">Asignadas</button>
      <button onclick="setFiltro('En_Progreso')" id="filtroEnProgreso"
        class="shrink-0 px-3 py-1.5 rounded-full text-xs font-medium transition border border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-400">En Progreso</button>
      <button onclick="setFiltro('Pausada')" id="filtroPausada"
        class="shrink-0 px-3 py-1.5 rounded-full text-xs font-medium transition border border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-400">Pausadas</button>
      <button onclick="setFiltro('Completada')" id="filtroCompletada"
        class="shrink-0 px-3 py-1.5 rounded-full text-xs font-medium transition border border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-400">Completadas</button>
    </div>

    <div id="listaOrdenes" class="space-y-3">
      <div class="bg-white dark:bg-gray-900 rounded-2xl p-6 text-center text-gray-400">Cargando órdenes...</div>
    </div>
  </main>

  <!-- MODAL PAUSA -->
  <div id="modalPausa" class="fixed inset-0 z-50 hidden items-center justify-center px-4">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
    <div class="relative w-full max-w-sm bg-white dark:bg-gray-900 rounded-2xl shadow-2xl p-6 z-10">
      <h3 class="text-base font-bold mb-4">¿Motivo de pausa?</h3>
      <textarea id="motivoPausa" rows="3" placeholder="Ej. Urgencia orden 80656969..."
        class="w-full px-3 py-2.5 rounded-lg border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-[#1A56B4] transition resize-none"></textarea>
      <div id="pausaError" class="hidden text-sm text-red-500 mt-2"></div>
      <div class="flex gap-3 mt-4">
        <button onclick="cerrarModalPausa()"
          class="flex-1 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 text-sm font-medium hover:bg-gray-50 dark:hover:bg-gray-800 transition">Cancelar</button>
        <button onclick="confirmarPausa()"
          class="flex-1 py-2.5 rounded-xl text-white text-sm font-semibold transition hover:opacity-90 active:scale-95"
          style="background-color:#0D3B85">Confirmar Pausa</button>
      </div>
    </div>
  </div>

  <!-- MODAL RESULTADO -->
  <div id="modalResultado" class="fixed inset-0 z-50 hidden items-center justify-center px-4">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
    <div class="relative w-full max-w-sm bg-white dark:bg-gray-900 rounded-2xl shadow-2xl p-6 z-10 text-center">
      <div class="w-14 h-14 rounded-full bg-green-100 dark:bg-green-900 flex items-center justify-center mx-auto mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-green-600 dark:text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/>
        </svg>
      </div>
      <h3 class="text-base font-bold mb-1">¡Orden Completada!</h3>
      <p class="text-sm text-gray-400 mb-3">Orden <span id="resultadoNumero" class="font-mono font-semibold text-gray-700 dark:text-gray-200"></span></p>
      <div class="bg-gray-50 dark:bg-gray-800 rounded-xl p-4 text-left space-y-2 mb-5">
        <div class="flex justify-between text-sm">
          <span class="text-gray-400">Tiempo neto</span>
          <span id="resultadoNeto" class="font-semibold"></span>
        </div>
        <div class="flex justify-between text-sm">
          <span class="text-gray-400">Pausas</span>
          <span id="resultadoPausas" class="font-semibold"></span>
        </div>
      </div>
      <button onclick="cerrarModalResultado()"
        class="w-full py-2.5 rounded-xl text-white text-sm font-semibold transition hover:opacity-90"
        style="background-color:#0D3B85">Cerrar</button>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="fixed bottom-6 right-4 z-50 hidden">
    <div id="toastInner" class="flex items-center gap-2 px-4 py-3 rounded-xl shadow-lg text-sm font-medium text-white">
      <span id="toastMsg"></span>
    </div>
  </div>

  <script>
    // ── SUPABASE ────────────────────────────────────────────────
    const SB_URL  = 'https://mwivnsbybzsivicrrbpd.supabase.co';
    const SB_KEY  = 'sb_publishable_O0H19Ni20_MsQ7kYsRtlHA_AJ250EKE';
    const SB_HDR  = { 'Content-Type':'application/json', 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` };

    async function sbGet(table, params='') {
      const r = await fetch(`${SB_URL}/rest/v1/${table}${params?'?'+params:''}`, { headers: SB_HDR });
      if (!r.ok) throw new Error(await r.text());
      return r.json();
    }
    async function sbPost(table, body) {
      const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
        method:'POST', headers:{...SB_HDR,'Prefer':'return=representation'}, body: JSON.stringify(body)
      });
      if (!r.ok) throw new Error(await r.text());
      return r.json();
    }
    async function sbPatch(table, params, body) {
      const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, {
        method:'PATCH', headers:{...SB_HDR,'Prefer':'return=representation'}, body: JSON.stringify(body)
      });
      if (!r.ok) throw new Error(await r.text());
      return r.json();
    }
    const ts = () => new Date().toISOString();

    // ── INDEXEDDB PARA OFFLINE ─────────────────────────────────
    let db;
    async function initDB() {
      return new Promise((res, rej) => {
        const req = indexedDB.open('almacen_operario', 1);
        req.onupgradeneeded = e => {
          const d = e.target.result;
          if (!d.objectStoreNames.contains('ordenes'))
            d.createObjectStore('ordenes', { keyPath: 'numero_orden' });
          if (!d.objectStoreNames.contains('cola'))
            d.createObjectStore('cola', { autoIncrement: true });
        };
        req.onsuccess = e => { db = e.target.result; res(db); };
        req.onerror  = () => rej(req.error);
      });
    }
    async function dbPut(store, obj) {
      return new Promise((res, rej) => {
        const tx = db.transaction(store, 'readwrite');
        const req = tx.objectStore(store).put(obj);
        req.onsuccess = () => res(); req.onerror = () => rej(req.error);
      });
    }
    async function dbGetAll(store) {
      return new Promise((res, rej) => {
        const tx = db.transaction(store, 'readonly');
        const req = tx.objectStore(store).getAll();
        req.onsuccess = () => res(req.result); req.onerror = () => rej(req.error);
      });
    }
    async function dbClear(store) {
      return new Promise((res, rej) => {
        const tx = db.transaction(store, 'readwrite');
        const req = tx.objectStore(store).clear();
        req.onsuccess = () => res(); req.onerror = () => rej(req.error);
      });
    }

    // ── ESTADO ─────────────────────────────────────────────────
    let sesion = null, ordenesData = [], tiemposData = [];
    let filtroActivo = 'Asignada', ordenPausando = null;
    let isOnline = navigator.onLine;
    const INACTIVITY_MS = 4 * 60 * 60 * 1000;

    const BADGE = {
      Asignada:'bg-purple-100 text-purple-700 dark:bg-purple-900 dark:text-purple-300',
      En_Progreso:'bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-300',
      Pausada:'bg-orange-100 text-orange-700 dark:bg-orange-900 dark:text-orange-300',
      Completada:'bg-teal-100 text-teal-700 dark:bg-teal-900 dark:text-teal-300',
    };
    const LABEL = { Asignada:'Asignada', En_Progreso:'En Progreso', Pausada:'Pausada', Completada:'Completada' };

    // ── INIT ───────────────────────────────────────────────────
    async function init() {
      applyTheme(localStorage.getItem('theme') === 'dark');
      const raw = localStorage.getItem('usuario');
      if (!raw) { window.location.href = 'index.html'; return; }
      sesion = JSON.parse(raw);
      if (sesion.rol !== 'Operario' && sesion.rol !== 'Admin') { window.location.href = 'index.html'; return; }
      document.getElementById('navNombre').textContent = sesion.nombres || sesion.usuario;
      actualizarActividad();

      await initDB();
      actualizarEstadoRed();
      window.addEventListener('online',  () => { isOnline = true;  actualizarEstadoRed(); sincronizarCola(); cargarOrdenes(); });
      window.addEventListener('offline', () => { isOnline = false; actualizarEstadoRed(); cargarDesdeCache(); });
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) {
          if (isOnline) cargarOrdenes();
          else cargarDesdeCache();
        }
      });

      setFiltro('Asignada');
      if (isOnline) cargarOrdenes();
      else cargarDesdeCache();
      setInterval(() => {
        if (isOnline) cargarOrdenes();
        if (Date.now() - parseInt(localStorage.getItem('lastActivity')||'0') > INACTIVITY_MS) cerrarSesion();
      }, 60000);
    }

    function actualizarEstadoRed() {
      const badge = document.getElementById('offlineBadge');
      if (isOnline) badge.classList.add('hidden');
      else badge.classList.remove('hidden'), badge.style.display = 'flex';
    }

    // ── CARGA ONLINE ───────────────────────────────────────────
    async function cargarOrdenes() {
      try {
        const [ordenes, tiempos] = await Promise.all([
          sbGet('ordenes', `usuario_asignado=eq.${encodeURIComponent(sesion.usuario)}&order=created_at.desc`),
          sbGet('tiempos', `usuario_operario=eq.${encodeURIComponent(sesion.usuario)}&order=created_at.desc`),
        ]);
        // Guardar en cache IndexedDB
        await dbClear('ordenes');
        for (const o of ordenes) await dbPut('ordenes', o);

        ordenesData = ordenes.map(normalizeOrden);
        tiemposData = tiempos.map(normalizeTiempo);
        renderOrdenes();
        ocultarOverlay();
      } catch(e) {
        ocultarOverlay();
        if (!isOnline) cargarDesdeCache();
        else mostrarToast('Error al cargar órdenes', 'error');
      }
    }

    // ── CARGA OFFLINE (IndexedDB) ──────────────────────────────
    async function cargarDesdeCache() {
      try {
        const ordenes = await dbGetAll('ordenes');
        ordenesData = ordenes.map(normalizeOrden);
        renderOrdenes();
        mostrarToast('Mostrando datos guardados (sin red)', 'error');
      } catch { mostrarToast('Sin datos disponibles offline', 'error'); }
      ocultarOverlay();
    }

    // ── SINCRONIZAR COLA OFFLINE ───────────────────────────────
    async function sincronizarCola() {
      try {
        const cola = await dbGetAll('cola');
        if (!cola.length) return;
        for (const accion of cola) {
          try { await ejecutarAccion(accion); } catch {}
        }
        await dbClear('cola');
        mostrarToast('Sincronizado correctamente', 'success');
        cargarOrdenes();
      } catch {}
    }

    async function ejecutarAccion(accion) {
      if (accion.tipo === 'iniciar') {
        await sbPost('tiempos', {
          numero_orden: accion.numero, usuario_operario: sesion.usuario,
          inicio_operario: accion.ts, estado: 'En_Progreso',
          total_pausas_minutos: 0, detalles_pausas: [], created_at: accion.ts,
        });
        await sbPatch('ordenes', `numero_orden=eq.${encodeURIComponent(accion.numero)}`, { estado:'En_Progreso', updated_at: accion.ts });
      } else if (accion.tipo === 'pausar') {
        // pausar: actualizar en tiempos
        const rows = await sbGet('tiempos', `numero_orden=eq.${encodeURIComponent(accion.numero)}&usuario_operario=eq.${encodeURIComponent(sesion.usuario)}&estado=eq.En_Progreso`);
        if (rows.length) {
          const pausas = rows[0].detalles_pausas || [];
          pausas.push({ inicio: accion.ts, fin: null, motivo: accion.motivo });
          await sbPatch('tiempos', `id=eq.${rows[0].id}`, { estado:'Pausado', detalles_pausas: pausas });
          await sbPatch('ordenes', `numero_orden=eq.${encodeURIComponent(accion.numero)}`, { estado:'Pausada', updated_at: accion.ts });
        }
      } else if (accion.tipo === 'reanudar') {
        const rows = await sbGet('tiempos', `numero_orden=eq.${encodeURIComponent(accion.numero)}&usuario_operario=eq.${encodeURIComponent(sesion.usuario)}&estado=eq.Pausado`);
        if (rows.length) {
          const pausas = rows[0].detalles_pausas || [];
          const ultima = pausas[pausas.length - 1];
          if (ultima && !ultima.fin) ultima.fin = accion.ts;
          const totalPausas = pausas.reduce((a, p) => p.inicio && p.fin ? a + (new Date(p.fin) - new Date(p.inicio))/60000 : a, 0);
          await sbPatch('tiempos', `id=eq.${rows[0].id}`, { estado:'En_Progreso', detalles_pausas: pausas, total_pausas_minutos: Math.round(totalPausas*100)/100 });
          await sbPatch('ordenes', `numero_orden=eq.${encodeURIComponent(accion.numero)}`, { estado:'En_Progreso', updated_at: accion.ts });
        }
      } else if (accion.tipo === 'completar') {
        const rows = await sbGet('tiempos', `numero_orden=eq.${encodeURIComponent(accion.numero)}&usuario_operario=eq.${encodeURIComponent(sesion.usuario)}&estado=eq.En_Progreso`);
        if (rows.length) {
          const t = rows[0];
          const bruto = (new Date(accion.ts) - new Date(t.inicio_operario))/60000;
          const neto  = Math.round((bruto - (t.total_pausas_minutos||0))*100)/100;
          await sbPatch('tiempos', `id=eq.${t.id}`, { fin_operario: accion.ts, estado:'Completado', tiempo_neto_minutos: neto });
          await sbPatch('ordenes', `numero_orden=eq.${encodeURIComponent(accion.numero)}`, { estado:'Completada', fin_operario: accion.ts, updated_at: accion.ts });
        }
      }
    }

    // ── NORMALIZAR ─────────────────────────────────────────────
    function normalizeOrden(o) {
      return {
        numero: o.numero_orden, area: o.area, estado: o.estado,
        of: o.of, timestampEdicion: o.updated_at,
        usuarioAsignado: o.usuario_asignado,
      };
    }
    function normalizeTiempo(t) {
      return {
        numeroOrden: t.numero_orden, inicioOperario: t.inicio_operario,
        estado: t.estado, totalPausasMin: t.total_pausas_minutos,
        tiempoNetoMin: t.tiempo_neto_minutos, detallesPausas: t.detalles_pausas,
      };
    }

    // ── SESIÓN ─────────────────────────────────────────────────
    function actualizarActividad() {
      localStorage.setItem('lastActivity', Date.now());
      ['click','keydown','touchstart'].forEach(ev =>
        document.addEventListener(ev, () => localStorage.setItem('lastActivity', Date.now()), { passive: true })
      );
    }
    function cerrarSesion() {
      localStorage.removeItem('usuario'); localStorage.removeItem('lastActivity');
      window.location.href = 'index.html';
    }

    // ── TEMA ───────────────────────────────────────────────────
    function applyTheme(dark) {
      document.documentElement.classList.toggle('dark', dark);
      document.getElementById('iconSun').classList.toggle('hidden', !dark);
      document.getElementById('iconMoon').classList.toggle('hidden', dark);
    }
    function toggleTheme() {
      const isDark = document.documentElement.classList.contains('dark');
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
      applyTheme(!isDark);
    }

    function ocultarOverlay() { const el=document.getElementById('loadingOverlay'); if(el) el.style.display='none'; }

    // ── FILTRO ─────────────────────────────────────────────────
    function setFiltro(estado) {
      filtroActivo = estado;
      const ids  = ['filtroTodos','filtroAsignada','filtroEnProgreso','filtroPausada','filtroCompletada'];
      const vals = ['','Asignada','En_Progreso','Pausada','Completada'];
      ids.forEach((id, i) => {
        const btn = document.getElementById(id);
        const activo = vals[i] === estado;
        btn.className = activo
          ? 'shrink-0 px-3 py-1.5 rounded-full text-xs font-medium transition border text-white'
          : 'shrink-0 px-3 py-1.5 rounded-full text-xs font-medium transition border border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-400';
        btn.style.backgroundColor = activo ? '#0D3B85' : '';
        btn.style.borderColor     = activo ? '#0D3B85' : '';
      });
      renderOrdenes();
    }

    // ── RENDER ─────────────────────────────────────────────────
    function renderOrdenes() {
      const lista = document.getElementById('listaOrdenes');
      let ordenes = ordenesData;
      if (filtroActivo) ordenes = ordenes.filter(o => o.estado === filtroActivo);
      if (!ordenes.length) {
        lista.innerHTML = `<div class="bg-white dark:bg-gray-900 rounded-2xl p-8 text-center text-gray-400">No hay órdenes en este estado</div>`;
        return;
      }
      lista.innerHTML = ordenes.map(o => {
        const tiempo = tiemposData.find(t => String(t.numeroOrden) === String(o.numero));
        const fechaAsig = o.timestampEdicion ? new Date(o.timestampEdicion).toLocaleString('es-PE',{dateStyle:'short',timeStyle:'short'}) : '-';
        const tiempoInfo = tiempo?.inicioOperario
          ? `<p class="text-xs text-gray-400 mt-1">Iniciado: ${new Date(tiempo.inicioOperario).toLocaleString('es-PE',{dateStyle:'short',timeStyle:'short'})}</p>` : '';
        const ofBadge = o.of
          ? `<span class="inline-block mt-0.5 text-xs text-gray-500 dark:text-gray-400 font-mono bg-gray-100 dark:bg-gray-800 px-2 py-0.5 rounded">OF: ${o.of}</span>` : '';
        const pausaWarning = tiempo?.estado === 'Pausado'
          ? `<div class="mt-3 flex items-center gap-2 text-xs text-orange-600 dark:text-orange-400 bg-orange-50 dark:bg-orange-950 rounded-lg px-3 py-2">
               <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                 <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
               </svg>
               Orden en pausa. Reanuda o finaliza cuando puedas.
             </div>` : '';
        return `
        <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-sm p-4">
          <div class="flex items-start justify-between mb-2">
            <div>
              <p class="font-mono font-bold text-base">${o.numero}</p>
              ${ofBadge}
              <p class="text-xs text-gray-400 mt-0.5">Área: ${o.area||'-'}</p>
              <p class="text-xs text-gray-400">Asignado: ${fechaAsig}</p>
              ${tiempoInfo}
            </div>
            <span class="px-2.5 py-1 rounded-full text-xs font-medium ${BADGE[o.estado]||''}">${LABEL[o.estado]||o.estado}</span>
          </div>
          ${pausaWarning}
          <div class="flex flex-wrap gap-2 mt-4">${getBotones(o, tiempo)}</div>
        </div>`;
      }).join('');
    }

    function getBotones(orden, tiempo) {
      const num = orden.numero;
      if (orden.estado === 'Asignada') return `
        <button onclick="comenzarTrabajo('${num}')"
          class="flex-1 py-2.5 rounded-xl text-white text-sm font-semibold transition hover:opacity-90 active:scale-95"
          style="background-color:#0D3B85">Comenzar</button>`;
      if (orden.estado === 'En_Progreso') return `
        <button onclick="abrirModalPausa('${num}')"
          class="flex-1 py-2.5 rounded-xl text-sm font-semibold border border-orange-300 text-orange-600 dark:text-orange-400 dark:border-orange-700 transition hover:bg-orange-50 dark:hover:bg-orange-950 active:scale-95">
          &#9646;&#9646; Pausar</button>
        <button onclick="finalizarTrabajo('${num}')"
          class="flex-1 py-2.5 rounded-xl text-white text-sm font-semibold transition hover:opacity-90 active:scale-95 bg-teal-600">
          ✓ Finalizar</button>`;
      if (orden.estado === 'Pausada') return `
        <button onclick="reanudarTrabajo('${num}')"
          class="flex-1 py-2.5 rounded-xl text-white text-sm font-semibold transition hover:opacity-90 active:scale-95"
          style="background-color:#0D3B85">&#9658; Reanudar</button>
        <button onclick="finalizarTrabajo('${num}')"
          class="flex-1 py-2.5 rounded-xl text-white text-sm font-semibold transition hover:opacity-90 active:scale-95 bg-teal-600">
          ✓ Finalizar</button>`;
      if (orden.estado === 'Completada' && tiempo) return `
        <button onclick="verResultado('${num}')"
          class="flex-1 py-2 rounded-xl text-sm border border-gray-200 dark:border-gray-700 text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition">
          Ver resumen</button>`;
      return '';
    }

    // ── ACCIONES (optimista + cola offline) ────────────────────
    async function comenzarTrabajo(numero) {
      // Optimista: actualizar UI inmediatamente
      const orden = ordenesData.find(o => String(o.numero) === String(numero));
      if (orden) { orden.estado = 'En_Progreso'; renderOrdenes(); }
      const accion = { tipo:'iniciar', numero, ts: ts() };

      if (!isOnline) {
        await dbPut('cola', accion);
        mostrarToast('Guardado offline — se sincronizará al recuperar conexión', 'success');
        return;
      }
      try {
        await sbPost('tiempos', {
          numero_orden: numero, usuario_operario: sesion.usuario,
          inicio_operario: accion.ts, estado: 'En_Progreso',
          total_pausas_minutos: 0, detalles_pausas: [], created_at: accion.ts,
        });
        await sbPatch('ordenes', `numero_orden=eq.${encodeURIComponent(numero)}`, { estado:'En_Progreso', updated_at: accion.ts });
        mostrarToast('Trabajo iniciado', 'success');
        cargarOrdenes();
      } catch {
        if (orden) { orden.estado = 'Asignada'; renderOrdenes(); }
        mostrarToast('Error de conexión', 'error');
      }
    }

    function abrirModalPausa(numero) {
      ordenPausando = numero;
      document.getElementById('motivoPausa').value = '';
      document.getElementById('pausaError').classList.add('hidden');
      const m = document.getElementById('modalPausa'); m.classList.remove('hidden'); m.classList.add('flex');
    }
    function cerrarModalPausa() {
      document.getElementById('modalPausa').classList.add('hidden');
      document.getElementById('modalPausa').classList.remove('flex');
      ordenPausando = null;
    }

    async function confirmarPausa() {
      const motivo = document.getElementById('motivoPausa').value.trim();
      if (!motivo) {
        document.getElementById('pausaError').textContent = 'Ingresa el motivo de la pausa';
        document.getElementById('pausaError').classList.remove('hidden'); return;
      }
      const accion = { tipo:'pausar', numero: ordenPausando, motivo, ts: ts() };
      cerrarModalPausa();
      const orden = ordenesData.find(o => String(o.numero) === String(accion.numero));
      if (orden) { orden.estado = 'Pausada'; renderOrdenes(); }

      if (!isOnline) { await dbPut('cola', accion); mostrarToast('Pausa guardada offline', 'success'); return; }
      try {
        await ejecutarAccion(accion);
        mostrarToast('Orden pausada', 'success'); cargarOrdenes();
      } catch { mostrarToast('Error de conexión', 'error'); }
    }

    async function reanudarTrabajo(numero) {
      const accion = { tipo:'reanudar', numero, ts: ts() };
      const orden = ordenesData.find(o => String(o.numero) === String(numero));
      if (orden) { orden.estado = 'En_Progreso'; renderOrdenes(); }

      if (!isOnline) { await dbPut('cola', accion); mostrarToast('Reanudado offline', 'success'); return; }
      try {
        await ejecutarAccion(accion);
        mostrarToast('Trabajo reanudado', 'success'); cargarOrdenes();
      } catch { mostrarToast('Error de conexión', 'error'); }
    }

    async function finalizarTrabajo(numero) {
      const accion = { tipo:'completar', numero, ts: ts() };
      const orden = ordenesData.find(o => String(o.numero) === String(numero));
      if (orden) { orden.estado = 'Completada'; renderOrdenes(); }

      if (!isOnline) { await dbPut('cola', accion); mostrarToast('Completado offline — se sincronizará al recuperar conexión', 'success'); return; }
      try {
        await ejecutarAccion(accion);
        // Mostrar modal de resultado
        const tiempos = await sbGet('tiempos', `numero_orden=eq.${encodeURIComponent(numero)}&usuario_operario=eq.${encodeURIComponent(sesion.usuario)}`);
        const t = tiempos[0];
        document.getElementById('resultadoNumero').textContent = numero;
        document.getElementById('resultadoNeto').textContent = t ? formatMinutos(t.tiempo_neto_minutos) : '-';
        document.getElementById('resultadoPausas').textContent = t ? formatMinutos(t.total_pausas_minutos||0) : '0 min';
        const m = document.getElementById('modalResultado'); m.classList.remove('hidden'); m.classList.add('flex');
        cargarOrdenes();
      } catch { mostrarToast('Error de conexión', 'error'); }
    }

    function verResultado(numero) {
      document.getElementById('resultadoNumero').textContent = numero;
      const t = tiemposData.find(t => String(t.numeroOrden) === String(numero));
      if (t) {
        document.getElementById('resultadoNeto').textContent = t.tiempoNetoMin != null ? formatMinutos(t.tiempoNetoMin) : '-';
        document.getElementById('resultadoPausas').textContent = formatMinutos(t.totalPausasMin||0);
      }
      const m = document.getElementById('modalResultado'); m.classList.remove('hidden'); m.classList.add('flex');
    }
    function cerrarModalResultado() {
      const m = document.getElementById('modalResultado'); m.classList.add('hidden'); m.classList.remove('flex');
    }

    function formatMinutos(min) {
      if (!min || min <= 0) return '0 min';
      const h = Math.floor(min/60), m = Math.round(min%60);
      return h > 0 ? `${h}h ${m}min` : `${m} min`;
    }

    // ── TOAST ──────────────────────────────────────────────────
    let toastTimer;
    function mostrarToast(msg, tipo) {
      const toast = document.getElementById('toast');
      document.getElementById('toastInner').className = `flex items-center gap-2 px-4 py-3 rounded-xl shadow-lg text-sm font-medium text-white ${tipo==='success'?'bg-green-600':'bg-red-600'}`;
      document.getElementById('toastMsg').textContent = msg;
      toast.classList.remove('hidden');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.add('hidden'), 3500);
    }

    init();
  </script>
</body>
</html>
